name: Smoke check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/smoke-check.mjs

  typecheck-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g typescript
      - name: tsc --strict against a minimal Deno shim (no Deno CLI needed)
        run: |
          cd sklad/supabase/functions
          tsc --noEmit --strict --target es2022 --lib es2022,dom --skipLibCheck \
            _typecheck/deno-shim.d.ts notify-telegram/index.ts
          tsc --noEmit --strict --target es2022 --lib es2022,dom --skipLibCheck \
            _typecheck/deno-shim.d.ts fetch-item-prices/index.ts

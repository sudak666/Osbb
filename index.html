<body>

<div id="app-lock-screen">
    <div class="lock-container">
        <div class="app-icon-squircle">
            <svg aria-hidden="true" focusable="false" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9"/><path d="M9.5 20v-6h5v6"/></svg>
        </div>
        <div class="lock-title">ОСББ "Микитська Слобода"</div>
        <div class="lock-subtitle">Введіть PIN для входу</div>

        <div class="pin-dots-wrapper" id="lock-dots-container">
            <div id="lock-d0" class="pin-dot"></div>
            <div id="lock-d1" class="pin-dot"></div>
            <div id="lock-d2" class="pin-dot"></div>
            <div id="lock-d3" class="pin-dot"></div>
        </div>
        <div id="lock-err" class="lock-error-text" role="alert" aria-live="assertive"></div>

        <div class="pin-keyboard">
            <button type="button" class="pin-btn" data-lock-digit="1">1</button>
            <button type="button" class="pin-btn" data-lock-digit="2">2</button>
            <button type="button" class="pin-btn" data-lock-digit="3">3</button>
            <button type="button" class="pin-btn" data-lock-digit="4">4</button>
            <button type="button" class="pin-btn" data-lock-digit="5">5</button>
            <button type="button" class="pin-btn" data-lock-digit="6">6</button>
            <button type="button" class="pin-btn" data-lock-digit="7">7</button>
            <button type="button" class="pin-btn" data-lock-digit="8">8</button>
            <button type="button" class="pin-btn" data-lock-digit="9">9</button>
            <div></div>
            <button type="button" class="pin-btn" data-lock-digit="0">0</button>
            <button type="button" class="pin-text-btn" data-lock-delete>Видалити</button>
        </div>
    </div>
</div>
<script>
    // Ховаємо екран блокування якнайшвидше, щоб при поверненні в межах уже
    // авторизованої сесії він не встигав промайнути, поки парситься решта сторінки.
    const EARLY_AUTH_TTL_MS = 12 * 60 * 60 * 1000;
    const earlyAuthAt = Number(sessionStorage.getItem('auth_at') || 0);
    const earlyAuthFresh = earlyAuthAt && Date.now() - earlyAuthAt < EARLY_AUTH_TTL_MS;
    if (sessionStorage.getItem('auth') === 'ok' && earlyAuthFresh) {
        const earlyLockScreen = document.getElementById('app-lock-screen');
        if (earlyLockScreen) earlyLockScreen.style.display = 'none';
    } else if (sessionStorage.getItem('auth') === 'ok') {
        sessionStorage.removeItem('auth');
        sessionStorage.removeItem('auth_at');
    }
</script>

                <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-3"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                Журнал
            </button>
            <button type="button" class="shell-tab-btn" id="shell-tab-sklad" data-shell-tab="sklad" role="tab" aria-selected="false" aria-controls="frame-sklad">
                <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Склад
            </button>
            <a href="https://www.deyecloud.com/station/new-main?t=1783238196915&id=61184357"
               target="_blank"
               rel="noopener noreferrer"
               class="shell-tab-btn"
               id="shell-tab-deye">
                <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Deye ↗

            <button type="button" class="shell-tab-btn shell-lock-btn" id="shell-lock-btn" data-shell-lock aria-label="Заблокувати застосунок" title="Заблокувати">
                <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Блок
            </button>
        </div>
    </div>
    <div id="shell-frames">
        <iframe id="frame-journal" title="Журнал ОСББ" role="tabpanel" aria-labelledby="shell-tab-journal"></iframe>
        <iframe id="frame-sklad" title="Склад ОСББ" role="tabpanel" aria-labelledby="shell-tab-sklad"></iframe>
    </div>
</div>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2334c759'/><path d='M18 52 L50 24 L82 52' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='28' y='50' width='44' height='34' rx='6' fill='white'/><rect x='43' y='64' width='14' height='20' rx='3' fill='%2334c759'/></svg>">

<title>ОСББ "Микитська Слобода"</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app-lock-screen">
    <div class="lock-container">
        <div class="app-icon-squircle">
            <span class="mdi mdi-home-outline shell-mdi-logo" aria-hidden="true"></span>
        </div>
        <div class="lock-title">ОСББ "Микитська Слобода"</div>
        <div class="lock-subtitle">Введіть PIN для входу</div>

        <div class="pin-dots-wrapper" id="lock-dots-container">
            <div id="lock-d0" class="pin-dot"></div>
            <div id="lock-d1" class="pin-dot"></div>
            <div id="lock-d2" class="pin-dot"></div>
            <div id="lock-d3" class="pin-dot"></div>
        </div>
        <div id="lock-err" class="lock-error-text" role="alert" aria-live="assertive"></div>

        <div class="pin-keyboard">
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="1">1</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="2">2</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="3">3</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="4">4</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="5">5</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="6">6</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="7">7</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="8">8</button>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="9">9</button>
            <div></div>
            <button type="button" class="pin-btn md-state-layer" data-lock-digit="0">0</button>
            <button type="button" class="pin-text-btn md-state-layer" data-lock-delete>Видалити</button>
        </div>
    </div>
</div>
<script>
    // Ховаємо екран блокування якнайшвидше, щоб при поверненні в межах уже
    // авторизованої сесії він не встигав промайнути, поки парситься решта сторінки.
    const EARLY_AUTH_TTL_MS = 12 * 60 * 60 * 1000;
    const earlyAuthAt = Number(sessionStorage.getItem('auth_at') || 0);
    const earlyAuthFresh = earlyAuthAt && Date.now() - earlyAuthAt < EARLY_AUTH_TTL_MS;
    if (sessionStorage.getItem('auth') === 'ok' && earlyAuthFresh) {
        const earlyLockScreen = document.getElementById('app-lock-screen');
        if (earlyLockScreen) earlyLockScreen.style.display = 'none';
    } else if (sessionStorage.getItem('auth') === 'ok') {
        sessionStorage.removeItem('auth');
        sessionStorage.removeItem('auth_at');
    }
</script>

<div id="shell-main">
    <div id="shell-tabs">
        <div class="ios-segmented-control" role="tablist" aria-label="Розділи застосунку">
            <button type="button" class="shell-tab-btn md-state-layer active" id="shell-tab-journal" data-shell-tab="journal" role="tab" aria-selected="true" aria-controls="frame-journal" aria-current="page">
                <span class="mdi mdi-clipboard-text-outline shell-mdi-icon" aria-hidden="true"></span>
                Журнал
            </button>
            <button type="button" class="shell-tab-btn md-state-layer" id="shell-tab-sklad" data-shell-tab="sklad" role="tab" aria-selected="false" aria-controls="frame-sklad">
                <span class="mdi mdi-package-variant-closed shell-mdi-icon" aria-hidden="true"></span>
                Склад
            </button>
            <a href="https://www.deyecloud.com/station/new-main?t=1783238196915&id=61184357"
               target="_blank"
               rel="noopener noreferrer"
               class="shell-tab-btn md-state-layer"
               id="shell-tab-deye">
                <span class="mdi mdi-solar-power-variant-outline shell-mdi-icon" aria-hidden="true"></span>
                Deye ↗
            </a>
            <button type="button" class="shell-tab-btn shell-lock-btn md-state-layer" id="shell-lock-btn" data-shell-lock aria-label="Заблокувати застосунок" title="Заблокувати">
                <span class="mdi mdi-lock-outline shell-mdi-icon" aria-hidden="true"></span>
                Блок
            </button>
        </div>
    </div>
    <div id="shell-frames">
        <iframe id="frame-journal" title="Журнал ОСББ" role="tabpanel" aria-labelledby="shell-tab-journal"></iframe>
        <iframe id="frame-sklad" title="Склад ОСББ" role="tabpanel" aria-labelledby="shell-tab-sklad"></iframe>
    </div>
</div>

<script type="module" src="src/shell.js"></script>

</body>
</html>

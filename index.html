<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ОСББ">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2334c759'/><path d='M18 52 L50 24 L82 52' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='28' y='50' width='44' height='34' rx='6' fill='white'/><rect x='43' y='64' width='14' height='20' rx='3' fill='%2334c759'/></svg>">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ОСББ "Микитська Слобода"</title>
<style>
    /* Базові системні налаштування iOS */
    html, body { height: 100%; margin: 0; overflow: hidden; background: #000; }
    body { 
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; 
        -webkit-font-smoothing: antialiased; 
        -moz-osx-font-smoothing: grayscale;
        color: #fff;
        user-select: none;
    }

    /* ЕКРАН БЛОКУВАННЯ (iOS Passcode Style) */
    #app-lock-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .lock-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 290px;
    }
    .app-icon-squircle {
        width: 68px;
        height: 68px;
        border-radius: 16px;
        background: linear-gradient(135deg, #34c759, #248a3d);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(52, 199, 89, 0.3);
    }
    .lock-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
    .lock-subtitle { color: #8e8e93; font-size: 0.82rem; margin-bottom: 32px; }

    /* Індикатор крапок пароля */
    .pin-dots-wrapper { display: flex; gap: 20px; margin-bottom: 12px; min-height: 14px; }
    .pin-dot { 
        width: 12px; 
        height: 12px; 
        border-radius: 50%; 
        border: 1.5px solid rgba(255, 255, 255, 0.4);
        background: transparent;
        transition: background 0.12s ease, border-color 0.12s, transform 0.12s;
        box-sizing: border-box;
    }
    .pin-dot.filled { background: #fff; border-color: #fff; transform: scale(1.1); }
    .lock-error-text { color: #ff453a; font-size: 0.78rem; min-height: 18px; margin-bottom: 24px; text-align: center; font-weight: 500; }

    /* Кругла цифрова клавіатура iPhone */
    .pin-keyboard { display: grid; grid-template-columns: repeat(3, 76px); gap: 16px 20px; justify-content: center; }
    .pin-btn { 
        background: rgba(255, 255, 255, 0.08); 
        border: none;
        border-radius: 50%; 
        width: 76px; 
        height: 76px; 
        font-size: 1.9rem; 
        font-weight: 400; 
        color: #fff; 
        cursor: pointer; 
        transition: background 0.1s ease; 
        -webkit-tap-highlight-color: transparent; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
    }
    .pin-btn:active { background: rgba(255, 255, 255, 0.22); }
    .pin-text-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        color: #aeaeb2;
        font-size: 0.85rem;
        font-weight: 400;
    }
    .pin-text-btn:active { color: #fff; }

    /* Вібрація крапок при помилці (iOS Shake) */
    .shake { animation: ios-dot-shake 0.35s ease-in-out; }
    @keyframes ios-dot-shake {
        0%, 100% { transform: translateX(0); }
        15%, 45%, 75% { transform: translateX(-8px); }
        30%, 60%, 90% { transform: translateX(8px); }
    }

    /* ОСНОВНА ОБОЛОНКА (iOS Segmented Control) */
    #shell-main { display: none; flex-direction: column; height: 100%; }
    #shell-tabs { 
        display: flex; 
        padding: 10px 16px; 
        padding-top: calc(10px + env(safe-area-inset-top)); 
        background: #1c1c1e; 
        border-bottom: 1px solid #2c2c2e; 
        flex-shrink: 0; 
    }
    .ios-segmented-control {
        display: flex;
        width: 100%;
        background: rgba(116, 116, 128, 0.22);
        border-radius: 10px; /* Повністю закруглений контейнер без гострих кутів */
        padding: 2px;
        gap: 2px;
    }
    .shell-tab-btn { 
        flex: 1; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 5px; 
        padding: 8px 4px; 
        border-radius: 8px; /* Округлі внутрішні сегменти */
        border: none; 
        background: transparent; 
        color: #98989d; 
        font-size: 13px; 
        font-weight: 600; 
        cursor: pointer; 
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        -webkit-tap-highlight-color: transparent; 
        box-sizing: border-box;
        text-decoration: none;
    }
    /* Активний сегмент із фірмовою тінню Apple */
    .shell-tab-btn.active { 
        background: #34c759; 
        color: #fff; 
        box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.24), 0px 1px 2px rgba(0, 0, 0, 0.12);
    }
    .shell-tab-btn:active {
        transform: scale(0.97);
        opacity: 0.85;
    }

    /* Контейнер для фреймів */
    #shell-frames { position: relative; flex: 1; min-height: 0; background: #fff; }
    #shell-frames iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: #fff; }
    #shell-frames iframe.active { display: block; }
</style>
</head>
<body>

<div id="app-lock-screen">
    <div class="lock-container">
        <div class="app-icon-squircle">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9"/><path d="M9.5 20v-6h5v6"/></svg>
        </div>
        <div class="lock-title">ОСББ "Микитська Слобода"</div>
        <div class="lock-subtitle">Введіть PIN для входу</div>

        <div class="pin-dots-wrapper" id="lock-dots-container">
            <div id="lock-d0" class="pin-dot"></div>
            <div id="lock-d1" class="pin-dot"></div>
            <div id="lock-d2" class="pin-dot"></div>
            <div id="lock-d3" class="pin-dot"></div>
        </div>
        <div id="lock-err" class="lock-error-text"></div>

        <div class="pin-keyboard">
            <button onclick="lockPress('1')" class="pin-btn">1</button>
            <button onclick="lockPress('2')" class="pin-btn">2</button>
            <button onclick="lockPress('3')" class="pin-btn">3</button>
            <button onclick="lockPress('4')" class="pin-btn">4</button>
            <button onclick="lockPress('5')" class="pin-btn">5</button>
            <button onclick="lockPress('6')" class="pin-btn">6</button>
            <button onclick="lockPress('7')" class="pin-btn">7</button>
            <button onclick="lockPress('8')" class="pin-btn">8</button>
            <button onclick="lockPress('9')" class="pin-btn">9</button>
            <div></div>
            <button onclick="lockPress('0')" class="pin-btn">0</button>
            <button onclick="lockDel()" class="pin-text-btn">Видалити</button>
        </div>
    </div>
</div>

<div id="shell-main">
    <div id="shell-tabs">
        <div class="ios-segmented-control">
            <button class="shell-tab-btn active" id="shell-tab-journal" onclick="switchTab('journal')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-3"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                Журнал
            </button>
            <button class="shell-tab-btn" id="shell-tab-sklad" onclick="switchTab('sklad')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Склад
            </button>
            <a href="https://www.deyecloud.com/station/new-main?t=1783238196915&id=61184357" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="shell-tab-btn"
               id="shell-tab-deye">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Deye ↗
            </a>
        </div>
    </div>
    <div id="shell-frames">
        <iframe id="frame-journal" title="Журнал ОСББ"></iframe>
        <iframe id="frame-sklad" title="Склад ОСББ"></iframe>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jpwelaerkkdblpmkueid.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bgV5Xn4zCYCJOBptI7xWjg_0rV_3TP1';

    async function rpc(fn, params = {}) {
        const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        });
        const txt = await r.text();
        if (!r.ok) throw new Error(txt || r.statusText);
        return txt ? JSON.parse(txt) : null;
    }

    let lockBuf = '';
    let lockBusy = false;
    let lockFails = 0;

    function unlockShell() {
        const lockScreen = document.getElementById('app-lock-screen');
        if (lockScreen) lockScreen.style.display = 'none';
        document.getElementById('shell-main').style.display = 'flex';
        switchTab('journal');
    }

    function lockUpdateDots() {
        for (let i = 0; i < 4; i++) {
            const dot = document.getElementById('lock-d' + i);
            if (!dot) continue;
            if (i < lockBuf.length) {
                dot.classList.add('filled');
            } else {
                dot.classList.remove('filled');
            }
        }
    }

    function lockDel() {
        if (lockBusy) return;
        if (lockBuf.length > 0) lockBuf = lockBuf.slice(0, -1);
        const err = document.getElementById('lock-err');
        if (err) err.textContent = '';
        lockUpdateDots();
    }

    async function lockPress(digit) {
        if (lockBusy || lockBuf.length >= 4) return;
        lockBuf += digit;
        lockUpdateDots();
        
        if (lockBuf.length === 4) {
            const attempt = lockBuf;
            lockBusy = true;
            let ok = false;
            try { ok = await rpc('verify_lock_pin', { attempt }); } catch (e) { ok = false; }
            
            if (ok) {
                lockFails = 0;
                lockBusy = false;
                sessionStorage.setItem('auth', 'ok');
                lockBuf = '';
                unlockShell();
            } else {
                const err = document.getElementById('lock-err');
                if (err) err.textContent = 'Невірний PIN, спробуйте ще';
                lockFails++;
                lockBuf = '';
                lockUpdateDots();
                
                // Нативний ефект трясіння крапок пароля при помилці
                const dotsContainer = document.getElementById('lock-dots-container');
                if (dotsContainer) {
                    dotsContainer.classList.remove('shake');
                    void dotsContainer.offsetWidth; // Тригер перемальовування
                    dotsContainer.classList.add('shake');
                    setTimeout(() => dotsContainer.classList.remove('shake'), 350);
                }

                const lockout = Math.min(lockFails * 500, 5000);
                setTimeout(() => {
                    lockBusy = false;
                    const currentErr = document.getElementById('lock-err');
                    if (currentErr) currentErr.textContent = '';
                }, lockout);
            }
        }
    }

    const TAB_SRC = {
        journal: 'osbb/index.html?embed=1',
        sklad: 'sklad/index.html?embed=1'
    };
    const loadedTabs = {};

    function loadTab(name) {
        const frame = document.getElementById('frame-' + name);
        if (frame && !loadedTabs[name]) {
            frame.src = TAB_SRC[name];
            loadedTabs[name] = true;
        }
    }

    function switchTab(name) {
        loadTab(name);
        document.querySelectorAll('.shell-tab-btn').forEach(b => b.classList.remove('active'));
        const targetTab = document.getElementById('shell-tab-' + name);
        if (targetTab) targetTab.classList.add('active');
        
        document.querySelectorAll('#shell-frames iframe').forEach(f => f.classList.remove('active'));
        const targetFrame = document.getElementById('frame-' + name);
        if (targetFrame) targetFrame.classList.add('active');
    }

    if (sessionStorage.getItem('auth') === 'ok') {
        unlockShell();
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#34c759">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ОСББ">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2334c759'/><path d='M18 52 L50 24 L82 52' stroke='white' stroke-width='9' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='28' y='50' width='44' height='34' rx='5' fill='white'/><rect x='43' y='64' width='14' height='20' rx='2' fill='%2334c759'/></svg>">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОСББ "Микитська Слобода"</title>
<style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif; background: #000; -webkit-font-smoothing: antialiased; }

    /* ЕКРАН БЛОКУВАННЯ (та сама розмітка/стиль, що й у розділі "Журнал") */
    .pin-mb-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:50%; width:80px; height:80px; font-size:1.5rem; font-weight:300; color:#fff; cursor:pointer; transition:background .12s ease; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; }
    .pin-mb-btn:active { background:rgba(255,255,255,0.22); }

    /* SHELL: панель вкладок + iframe */
    #shell-main { display:none; flex-direction:column; height:100%; }
    #shell-tabs { display:flex; gap:8px; padding:10px 14px; padding-top:calc(10px + env(safe-area-inset-top)); background:#1c1c1e; border-bottom:1px solid #2c2c2e; flex-shrink:0; }
    .shell-tab-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 12px; border-radius:12px; border:none; background:transparent; color:#98989d; font-size:13px; font-weight:700; cursor:pointer; transition:background .15s, color .15s; -webkit-tap-highlight-color:transparent; }
    .shell-tab-btn.active { background:#34c759; color:#fff; }
    #shell-frames { position:relative; flex:1; min-height:0; }
    #shell-frames iframe { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; background:#fff; }
    #shell-frames iframe.active { display:block; }
</style>
</head>
<body>

<!-- ЕКРАН БЛОКУВАННЯ ПРИ ВХОДІ -->
<div id="app-lock-screen" style="position:fixed;inset:0;background:#1c1c1e;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:320px;padding:0 24px;">
        <div style="width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#34c759,#248a3d);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px rgba(52,199,89,0.35);"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9"/><path d="M9.5 20v-6h5v6"/></svg></div>
        <div style="color:#fff;font-size:1.15rem;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px;">ОСББ "Микитська Слобода"</div>
        <div style="color:#98989d;font-size:0.8rem;margin-bottom:36px;">Введіть PIN для входу</div>

        <div style="display:flex;gap:16px;margin-bottom:8px;">
            <div id="lock-d0" style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all .18s ease;"></div>
            <div id="lock-d1" style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all .18s ease;"></div>
            <div id="lock-d2" style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all .18s ease;"></div>
            <div id="lock-d3" style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all .18s ease;"></div>
        </div>
        <div id="lock-err" style="color:#ff453a;font-size:0.72rem;min-height:20px;margin-bottom:28px;text-align:center;"></div>

        <div style="display:grid;grid-template-columns:repeat(3,80px);grid-template-rows:repeat(4,80px);gap:8px;">
            <button onclick="lockPress('1')" class="pin-mb-btn">1</button>
            <button onclick="lockPress('2')" class="pin-mb-btn">2</button>
            <button onclick="lockPress('3')" class="pin-mb-btn">3</button>
            <button onclick="lockPress('4')" class="pin-mb-btn">4</button>
            <button onclick="lockPress('5')" class="pin-mb-btn">5</button>
            <button onclick="lockPress('6')" class="pin-mb-btn">6</button>
            <button onclick="lockPress('7')" class="pin-mb-btn">7</button>
            <button onclick="lockPress('8')" class="pin-mb-btn">8</button>
            <button onclick="lockPress('9')" class="pin-mb-btn">9</button>
            <div></div>
            <button onclick="lockPress('0')" class="pin-mb-btn">0</button>
            <button onclick="lockDel()" style="width:80px;height:80px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;color:rgba(255,255,255,0.85);font-size:0.75rem;font-weight:400;">Видалити</button>
        </div>
    </div>
</div>

<!-- ОСНОВНА ОБОЛОНКА: панель вкладок + iframe розділів -->
<div id="shell-main">
    <div id="shell-tabs">
        <button class="shell-tab-btn active" id="shell-tab-journal" onclick="switchTab('journal')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-3"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            Журнал
        </button>
        <button class="shell-tab-btn" id="shell-tab-sklad" onclick="switchTab('sklad')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Склад
        </button>
    </div>
    <div id="shell-frames">
        <iframe id="frame-journal" title="Журнал ОСББ"></iframe>
        <iframe id="frame-sklad" title="Склад ОСББ"></iframe>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jpwelaerkkdblpmkueid.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bgV5Xn4zCYCJOBptI7xWjg_0rV_3TP1';

    async function rpc(fn, params = {}) {
        const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        });
        const txt = await r.text();
        if (!r.ok) throw new Error(txt || r.statusText);
        return txt ? JSON.parse(txt) : null;
    }

    // ==========================================
    // ЕКРАН БЛОКУВАННЯ ВХОДУ
    // PIN перевіряється на сервері (Supabase RPC verify_lock_pin, той самий,
    // що й у розділі "Журнал"), сам код нікому не відомий на клієнті.
    // Після успішного входу тут же і в обох iframe-розділах (спільний
    // sessionStorage в межах одного origin) PIN повторно не питається.
    // ==========================================
    let lockBuf = '';

    function unlockShell() {
        const lockScreen = document.getElementById('app-lock-screen');
        if (lockScreen) lockScreen.style.display = 'none';
        document.getElementById('shell-main').style.display = 'flex';
        switchTab('journal');
    }

    function lockUpdateDots() {
        for (let i = 0; i < 4; i++) {
            const dot = document.getElementById('lock-d' + i);
            if (!dot) continue;
            dot.style.background = i < lockBuf.length ? '#34c759' : 'rgba(255,255,255,0.2)';
            dot.style.transform = i < lockBuf.length ? 'scale(1.2)' : 'scale(1)';
        }
    }

    function lockDel() {
        if (lockBuf.length > 0) lockBuf = lockBuf.slice(0, -1);
        const err = document.getElementById('lock-err');
        if (err) err.textContent = '';
        lockUpdateDots();
    }

    async function lockPress(digit) {
        if (lockBuf.length >= 4) return;
        lockBuf += digit;
        lockUpdateDots();
        if (lockBuf.length === 4) {
            const attempt = lockBuf;
            let ok = false;
            try { ok = await rpc('verify_lock_pin', { attempt }); } catch (e) { ok = false; }
            if (ok) {
                sessionStorage.setItem('auth', 'ok');
                lockBuf = '';
                unlockShell();
            } else {
                const err = document.getElementById('lock-err');
                if (err) err.textContent = 'Невірний PIN, спробуйте ще';
                lockBuf = '';
                lockUpdateDots();
                const box = document.querySelector('#app-lock-screen > div');
                if (box) {
                    box.style.animation = 'none';
                    box.style.transform = 'translateX(-8px)';
                    setTimeout(() => box.style.transform = 'translateX(8px)', 80);
                    setTimeout(() => box.style.transform = 'translateX(-5px)', 160);
                    setTimeout(() => box.style.transform = 'translateX(0)', 240);
                }
            }
        }
    }

    // ==========================================
    // ВКЛАДКИ
    // ==========================================
    const TAB_SRC = {
        journal: 'osbb/index.html?embed=1',
        sklad: 'sklad/index.html?embed=1'
    };
    const loadedTabs = {};

    function loadTab(name) {
        const frame = document.getElementById('frame-' + name);
        if (!loadedTabs[name]) {
            frame.src = TAB_SRC[name];
            loadedTabs[name] = true;
        }
    }

    function switchTab(name) {
        loadTab(name);
        document.querySelectorAll('.shell-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('shell-tab-' + name).classList.add('active');
        document.querySelectorAll('#shell-frames iframe').forEach(f => f.classList.remove('active'));
        document.getElementById('frame-' + name).classList.add('active');
    }

    // Якщо PIN вже введено цього сеансу — не питаємо повторно
    if (sessionStorage.getItem('auth') === 'ok') {
        unlockShell();
    }

    // На випадок старих встановлених PWA-іконок з активним service worker
    // попередньої версії застосунку — знімаємо його, щоб не заважав оновленням.
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(() => {});
    }
</script>

</body>
</html>

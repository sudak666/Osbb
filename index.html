<style>
    /* Базові системні налаштування iOS */
    html, body { height: 100%; margin: 0; overflow: hidden; background: #000; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #fff;
    }
    /* Не блокуємо виділення тексту глобально — лише на кнопках/навігації, як у нативних застосунках */
    button, .shell-tab-btn, .pin-btn, .pin-text-btn { user-select: none; -webkit-user-select: none; }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    }

    /* ЕКРАН БЛОКУВАННЯ (iOS Passcode Style) */
    #app-lock-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .lock-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 290px;
    }
    .app-icon-squircle {
        width: 68px;
        height: 68px;
        border-radius: 16px;
        background: linear-gradient(135deg, #34c759, #248a3d);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(52, 199, 89, 0.3);
    }
    .lock-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
    .lock-subtitle { color: #8e8e93; font-size: 0.82rem; margin-bottom: 32px; }

    /* Індикатор крапок пароля */
    .pin-dots-wrapper { display: flex; gap: 20px; margin-bottom: 12px; min-height: 14px; }
    .pin-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, 0.4);
        background: transparent;
        transition: background 0.12s ease, border-color 0.12s, transform 0.12s;
        box-sizing: border-box;
    }
    .pin-dot.filled { background: #fff; border-color: #fff; transform: scale(1.1); }
    .lock-error-text { color: #ff453a; font-size: 0.78rem; min-height: 18px; margin-bottom: 24px; text-align: center; font-weight: 500; }

    /* Кругла цифрова клавіатура iPhone */
    .pin-keyboard { display: grid; grid-template-columns: repeat(3, 76px); gap: 16px 20px; justify-content: center; }
    .pin-btn {
        background: rgba(255, 255, 255, 0.08);
        border: none;
        border-radius: 50%;
        width: 76px;
        height: 76px;
        font-size: 1.9rem;
        font-weight: 400;
        color: #fff;
        cursor: pointer;
        transition: background 0.1s ease;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .pin-btn:active { background: rgba(255, 255, 255, 0.22); }
    .pin-text-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
        color: #aeaeb2;
        font-size: 0.85rem;
        font-weight: 400;
    }
    .pin-text-btn:active { color: #fff; }

    /* Вібрація крапок при помилці (iOS Shake) */
    .shake { animation: ios-dot-shake 0.35s ease-in-out; }
    @keyframes ios-dot-shake {
        0%, 100% { transform: translateX(0); }
        15%, 45%, 75% { transform: translateX(-8px); }
        30%, 60%, 90% { transform: translateX(8px); }
    }

    /* ОСНОВНА ОБОЛОНКА (iOS Segmented Control) */
    #shell-main { display: none; flex-direction: column; height: 100%; }
    #shell-tabs {
        display: flex;
        padding: 10px 16px;
        padding-top: calc(10px + env(safe-area-inset-top));
        background: rgba(242, 242, 247, 0.82);
        border-bottom: 1px solid rgba(60, 60, 67, 0.12);
        backdrop-filter: saturate(180%) blur(24px);
        -webkit-backdrop-filter: saturate(180%) blur(24px);
        flex-shrink: 0;
    }
    .ios-segmented-control {
        display: flex;
        width: 100%;
        background: rgba(116, 116, 128, 0.16);
        border-radius: 14px; /* Повністю закруглений контейнер без гострих кутів */
        padding: 3px;
        gap: 3px;
        box-shadow: inset 0 0 0 0.5px rgba(60, 60, 67, 0.10);
    }
    .shell-tab-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 9px 4px;
        border-radius: 11px; /* Округлі внутрішні сегменти */
        border: none;
        background: transparent;
        color: #6e6e73;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
        text-decoration: none;
    }
    /* Активний сегмент із фірмовою тінню Apple */
    .shell-tab-btn.active {
        background: #34c759;
        color: #fff;
        box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.24), 0px 1px 2px rgba(0, 0, 0, 0.12);
    }
    .shell-tab-btn:active {
        transform: scale(0.97);
        opacity: 0.85;
    }

    /* Контейнер для фреймів */
    #shell-frames { position: relative; flex: 1; min-height: 0; background: #f2f2f7; }
    #shell-frames iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: #fff; }
    #shell-frames iframe.active { display: block; }
    .shell-lock-btn { flex: 0 0 auto; min-width: 74px; color: #ff3b30; }

    /* Видимий фокус лише для клавіатурної навігації (не заважає кліку мишею/тапу) */
    :focus-visible { outline: 2px solid #34c759; outline-offset: 2px; }
    .pin-btn:focus-visible, .pin-text-btn:focus-visible { outline-color: #fff; }
</style>

<body>

<script>
    // Ховаємо екран блокування якнайшвидше, щоб при поверненні в межах уже
    // авторизованої сесії він не встигав промайнути, поки парситься решта сторінки.
    const EARLY_AUTH_TTL_MS = 12 * 60 * 60 * 1000;
    const earlyAuthAt = Number(sessionStorage.getItem('auth_at') || 0);
    const earlyAuthFresh = earlyAuthAt && Date.now() - earlyAuthAt < EARLY_AUTH_TTL_MS;
    if (sessionStorage.getItem('auth') === 'ok' && earlyAuthFresh) {
        const earlyLockScreen = document.getElementById('app-lock-screen');
        if (earlyLockScreen) earlyLockScreen.style.display = 'none';
    } else if (sessionStorage.getItem('auth') === 'ok') {
        sessionStorage.removeItem('auth');
        sessionStorage.removeItem('auth_at');
    }
</script>

<div id="shell-main">
    <div id="shell-tabs">
        <div class="ios-segmented-control" role="tablist" aria-label="Розділи застосунку">
            <button type="button" class="shell-tab-btn active" id="shell-tab-journal" data-shell-tab="journal" role="tab" aria-selected="true" aria-controls="frame-journal" aria-current="page">
                <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-3"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/></svg>

<script>
    const SUPABASE_URL = 'https://jpwelaerkkdblpmkueid.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bgV5Xn4zCYCJOBptI7xWjg_0rV_3TP1';

    async function rpc(fn, params = {}) {
        const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        });
        const txt = await r.text();
        if (!r.ok) throw new Error(txt || r.statusText);
        return txt ? JSON.parse(txt) : null;
    }

    const AUTH_TTL_MS = 12 * 60 * 60 * 1000;
    let lockBuf = '';
    let lockBusy = false;
    let lockFails = 0;

    function setAuthSession() {
        sessionStorage.setItem('auth', 'ok');
        sessionStorage.setItem('auth_at', String(Date.now()));
    }
    function clearAuthSession() {
        sessionStorage.removeItem('auth');
        sessionStorage.removeItem('auth_at');
    }
    function isAuthSessionValid() {
        if (sessionStorage.getItem('auth') !== 'ok') return false;
        const authAt = Number(sessionStorage.getItem('auth_at') || 0);
        if (!authAt || Date.now() - authAt >= AUTH_TTL_MS) {
            clearAuthSession();
            return false;
        }
        return true;
    }

    function unlockShell() {
        const lockScreen = document.getElementById('app-lock-screen');
        if (lockScreen) lockScreen.style.display = 'none';
        document.getElementById('shell-main').style.display = 'flex';
        resetIdleLockTimer();
        switchTab('journal');
    }

    function lockUpdateDots() {
        for (let i = 0; i < 4; i++) {
            const dot = document.getElementById('lock-d' + i);
            if (!dot) continue;
            if (i < lockBuf.length) {
                dot.classList.add('filled');
            } else {
                dot.classList.remove('filled');
            }
        }
    }

    function lockDel() {
        if (lockBusy) return;
        if (lockBuf.length > 0) lockBuf = lockBuf.slice(0, -1);
        const err = document.getElementById('lock-err');
        if (err) err.textContent = '';
        lockUpdateDots();
    }

    async function lockPress(digit) {
        if (lockBusy || lockBuf.length >= 4) return;
        lockBuf += digit;
        lockUpdateDots();

        if (lockBuf.length === 4) {
            const attempt = lockBuf;
            lockBusy = true;
            let ok = false;
            try { ok = await rpc('verify_lock_pin', { attempt }); } catch (e) { ok = false; }

            if (ok) {
                lockFails = 0;
                lockBusy = false;
                setAuthSession();
                resetIdleLockTimer();
                lockBuf = '';
                unlockShell();
            } else {
                const err = document.getElementById('lock-err');
                if (err) err.textContent = 'Невірний PIN, спробуйте ще';
                lockFails++;
                lockBuf = '';
                lockUpdateDots();

                // Нативний ефект трясіння крапок пароля при помилці
                const dotsContainer = document.getElementById('lock-dots-container');
                if (dotsContainer) {
                    dotsContainer.classList.remove('shake');
                    void dotsContainer.offsetWidth; // Тригер перемальовування
                    dotsContainer.classList.add('shake');
                    setTimeout(() => dotsContainer.classList.remove('shake'), 350);
                }

                const lockout = Math.min(lockFails * 500, 5000);
                setTimeout(() => {
                    lockBusy = false;
                    const currentErr = document.getElementById('lock-err');
                    if (currentErr) currentErr.textContent = '';
                }, lockout);
            }
        }
    }

    const TAB_SRC = {
        journal: 'osbb/index.html?embed=1',
        sklad: 'sklad/index.html?embed=1'
    };
    const loadedTabs = {};

    function loadTab(name) {
        const frame = document.getElementById('frame-' + name);
        if (frame && !loadedTabs[name]) {
            frame.src = TAB_SRC[name];
            loadedTabs[name] = true;
        }
    }

    function lockShellNow() {
        clearAuthSession();
        lockBuf = '';
        lockBusy = false;
        lockUpdateDots();
        const err = document.getElementById('lock-err');
        if (err) err.textContent = '';
        document.getElementById('shell-main').style.display = 'none';
        const lockScreen = document.getElementById('app-lock-screen');
        if (lockScreen) lockScreen.style.display = 'flex';
    }

    const IDLE_LOCK_MS = 15 * 60 * 1000;
    let idleLockTimer = null;
    function resetIdleLockTimer() {
        clearTimeout(idleLockTimer);
        if (isAuthSessionValid()) idleLockTimer = setTimeout(lockShellNow, IDLE_LOCK_MS);
    }
    function handleVisibilityLockTimer() {
        if (document.visibilityState === 'visible') resetIdleLockTimer();
    }
    ['pointerdown','keydown','touchstart'].forEach(evt => document.addEventListener(evt, resetIdleLockTimer, { passive: true }));
    document.addEventListener('visibilitychange', handleVisibilityLockTimer);
    window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) return;
        if (event.data && event.data.type === 'osbb:user-activity') resetIdleLockTimer();
    });

    function bindShellControls() {
        document.querySelectorAll('[data-lock-digit]').forEach((button) => {
            button.addEventListener('click', () => lockPress(button.dataset.lockDigit));
        });
        const deleteButton = document.querySelector('[data-lock-delete]');
        if (deleteButton) deleteButton.addEventListener('click', lockDel);

        document.querySelectorAll('[data-shell-tab]').forEach((button) => {
            button.addEventListener('click', () => switchTab(button.dataset.shellTab));
        });
        const lockButton = document.querySelector('[data-shell-lock]');
        if (lockButton) lockButton.addEventListener('click', lockShellNow);
    }

    function switchTab(name) {
        loadTab(name);
        document.querySelectorAll('.shell-tab-btn').forEach(b => {
            b.classList.remove('active');
            b.removeAttribute('aria-current');
            if (b.hasAttribute('role')) b.setAttribute('aria-selected', 'false');
        });
        const targetTab = document.getElementById('shell-tab-' + name);
        if (targetTab) {
            targetTab.classList.add('active');
            targetTab.setAttribute('aria-current', 'page');
            if (targetTab.hasAttribute('role')) targetTab.setAttribute('aria-selected', 'true');
        }

        document.querySelectorAll('#shell-frames iframe').forEach(f => f.classList.remove('active'));
        const targetFrame = document.getElementById('frame-' + name);
        if (targetFrame) targetFrame.classList.add('active');
    }

    bindShellControls();

    if (isAuthSessionValid()) {
        unlockShell();
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>

</body>
